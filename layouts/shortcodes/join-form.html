<form id="join-form" class="join-form" method="POST">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div class="form-group">
    <fieldset class="membership-type">
      <legend>Membership type</legend>
      <label class="radio-label">
        <input type="radio" name="membership" value="adult" required> Adult — $120 NZD
      </label>
      <label class="radio-label">
        <input type="radio" name="membership" value="youth"> Youth — $70 NZD
      </label>
    </fieldset>
  </div>

  <div class="form-group">
    <label class="checkbox-label">
      <input type="checkbox" id="consent" name="consent" required>
      <span>By proceeding I am applying for membership of WREC'kd and consent to my information being collected and retained for the purpose of processing this application and payment.</span>
    </label>
  </div>

  <button type="submit">Proceed to Payment</button>
  <div id="form-status" class="form-status"></div>
</form>

<script>
document.getElementById("join-form").addEventListener("submit", async function(e) {
  e.preventDefault();
  const status = document.getElementById("form-status");
  const btn = this.querySelector("button[type=submit]");

  btn.disabled = true;
  btn.textContent = "Redirecting to payment...";
  status.textContent = "";
  status.className = "form-status";

  const formData = new FormData(this);
  const data = {
    name: formData.get("name"),
    email: formData.get("email"),
    membership: formData.get("membership"),
  };

  try {
    const resp = await fetch("{{ .Get "action" }}/create-checkout-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const result = await resp.json();
    if (resp.ok && result.url) {
      window.location.href = result.url;
      return;
    } else {
      status.textContent = result.error || "Something went wrong. Please try again.";
      status.className = "form-status error";
    }
  } catch (err) {
    status.textContent = "Network error. Please try again.";
    status.className = "form-status error";
  }

  btn.disabled = false;
  btn.textContent = "Proceed to Payment";
});
</script>
